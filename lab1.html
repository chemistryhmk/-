<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторний дослід №1: Корозія заліза</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; color: #2c3e50; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .user-info { background: #e8f8f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #1abc9c; text-align: center; }
        .user-info input { padding: 10px; border-radius: 6px; border: 1px solid #bdc3c7; width: 300px; font-size: 1em; }
        .lab-content { opacity: 0.3; pointer-events: none; transition: 0.5s; }
        .lab-active { opacity: 1; pointer-events: auto; }
        .intro-section { border-bottom: 2px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .aim-box { background: #f4f7f9; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; font-size: 0.95em; }
        .lab-bench { display: flex; justify-content: space-around; padding: 20px; background: #fafafa; border-radius: 10px; margin-top: 20px; }
        .tube-container { display: flex; flex-direction: column; align-items: center; width: 180px; }
        .tube { width: 50px; height: 180px; border: 2px solid #bdc3c7; border-top: none; border-radius: 0 0 25px 25px; position: relative; background: rgba(255,255,255,0.8); }
        .liquid { position: absolute; bottom: 0; width: 100%; height: 0%; transition: height 1s; border-radius: 0 0 25px 25px; }
        .nail { width: 6px; height: 120px; background: #95a5a6; position: absolute; bottom: 10px; left: 22px; transition: 2s; border-radius: 2px; }
        .rust { background: #d35400 !important; filter: blur(2px); opacity: 0; transition: 3s; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .report { margin-top: 25px; padding: 20px; border: 1px solid #3498db; border-radius: 10px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="user-info">
        <label><b>Прізвище та Ім'я студента:</b></label><br><br>
        <input type="text" id="studentName" placeholder="Введіть ваше ім'я..." oninput="checkName()">
    </div>
    <div id="labWrapper" class="lab-content">
        <div class="intro-section">
            <h1>Дослід №1: Вплив середовища на швидкість корозії</h1>
            <div class="aim-box">
                <strong>Мета:</strong> Дослідити, як вода, розчин солі та кислота впливають на залізний цвях.
            </div>
        </div>
        <div class="controls">
            <button onclick="startLab()">Запустити дослід (через 3 дні...)</button>
        </div>
        <div class="lab-bench">
            <div class="tube-container">
                <div class="tube">
                    <div class="liquid" style="height: 60%; background: rgba(52, 152, 219, 0.2);"></div>
                    <div class="nail" id="nail1"></div>
                </div>
                <p>1. Вода</p>
            </div>
            <div class="tube-container">
                <div class="tube">
                    <div class="liquid" style="height: 60%; background: rgba(52, 152, 219, 0.4);"></div>
                    <div class="nail" id="nail2"></div>
                </div>
                <p>2. Розчин NaCl</p>
            </div>
            <div class="tube-container">
                <div class="tube">
                    <div class="liquid" style="height: 60%; background: rgba(231, 76, 60, 0.2);"></div>
                    <div class="nail" id="nail3"></div>
                </div>
                <p>3. Розчин HCl</p>
            </div>
        </div>
        <div class="report" id="report">
            <h3>Звіт</h3>
            <p>Спостереження: у якій пробірці корозія найсильніша?</p>
            <div style="text-align: right; font-style: italic;">Виконав(ла): <span id="displayName"></span></div>
        </div>
    </div>
</div>
<script>
    function checkName() {
        const val = document.getElementById('studentName').value;
        if (val.trim().length >= 3) document.getElementById('labWrapper').classList.add('lab-active');
    }
    function startLab() {
        document.getElementById('nail1').style.background = '#a04000';
        document.getElementById('nail2').style.background = '#8e44ad'; // сильніша зміна
        document.getElementById('nail3').style.background = '#7f8c8d';
        // додаємо візуальну іржу
        document.getElementById('nail2').style.boxShadow = '0 0 10px #d35400';
        document.getElementById('report').style.display = 'block';
        document.getElementById('displayName').innerText = document.getElementById('studentName').value;
    }
</script>
</body>
</html>
